<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Shortcut & Link Library Pro</title>
    <style>
        :root {
            --bg-color: #f2f2f7; --sidebar-bg: #e5e5ea; --text-main: #1c1c1e;
            --apple-blue: #007aff; --modal-bg: #ffffff; --card-shadow: rgba(0,0,0,0.1);
        }
        [data-theme='dark'] {
            --bg-color: #1c1c1e; --sidebar-bg: #2c2c2e; --text-main: #ffffff;
            --modal-bg: #3a3a3c; --card-shadow: rgba(0,0,0,0.3);
        }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; transition: 0.3s; }

        /* 사이드바 스타일 */
        .sidebar { 
            width: 250px; background: var(--sidebar-bg); padding: 20px 10px 40px 10px; 
            display: flex; flex-direction: column; gap: 5px; border-right: 1px solid rgba(0,0,0,0.1); 
            z-index: 100; transition: transform 0.3s ease; box-sizing: border-box; overflow-y: auto;
        }
        .group-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; border-radius: 10px;
        }
        .group-header:hover { background: rgba(0,0,0,0.05); }
        .folder-container { display: flex; flex-direction: column; gap: 2px; margin-left: 10px; overflow: hidden; transition: max-height 0.3s ease; }
        .folder-container.collapsed { max-height: 0; }
        
        .sidebar-item { padding: 10px 15px; border-radius: 10px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .sidebar-item.active { background: rgba(0,0,0,0.1); font-weight: bold; }

        /* 메인 영역 */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .header { padding: 20px 25px; display: flex; flex-direction: column; gap: 12px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        
        .search-bar-container { position: relative; width: 100%; }
        .search-bar { width: 100%; padding: 10px 15px 10px 35px; border-radius: 12px; border: none; background: rgba(0,0,0,0.06); color: var(--text-main); font-size: 1rem; box-sizing: border-box; }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.5; }

        /* 단축어 그리드 */
        .grid-container { flex: 1; overflow-y: auto; padding: 0 25px 30px 25px; display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 18px; align-content: start; }
        .shortcut-card { position: relative; aspect-ratio: 1 / 1; border-radius: 35px; padding: 22px; color: white; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 8px 16px var(--card-shadow); cursor: pointer; transition: 0.2s; }
        
        /* 링크 리스트 (가로형) */
        .link-list-container { flex: 1; overflow-y: auto; padding: 0 25px 30px 25px; display: flex; flex-direction: column; gap: 12px; }
        .link-card { 
            position: relative; width: 100%; padding: 18px 22px; border-radius: 25px; color: white; 
            display: flex; justify-content: space-between; align-items: center; cursor: pointer; box-shadow: 0 4px 10px var(--card-shadow);
        }
        .link-info { display: flex; flex-direction: column; gap: 2px; }
        .link-title { font-weight: bold; font-size: 1.1rem; }
        .link-url-text { font-size: 0.8rem; opacity: 0.8; text-decoration: underline; }

        /* 편집 모드 관련 */
        .del-badge { position: absolute; top: 12px; right: 12px; width: 28px; height: 28px; background: #ff3b30; color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 10; border: 2px solid white; }
        .edit-mode .del-badge { display: flex; }
        .more-dots { width: 32px; height: 32px; background: rgba(255,255,255,0.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* 모달 */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 200; padding: 20px; }
        .modal-content { background: var(--modal-bg); border-radius: 30px; width: 100%; max-width: 400px; padding: 28px; display: flex; flex-direction: column; gap: 10px; }
        input, textarea { background: rgba(0,0,0,0.05); border: none; padding: 12px; border-radius: 12px; color: var(--text-main); width: 100%; box-sizing: border-box; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; height: 100%; transform: translateX(-100%); padding-bottom: 90px; }
            .sidebar.open { transform: translateX(0); }
        }
    </style>
</head>
<body data-theme="light">

<div class="sidebar" id="sidebar">
    <div class="group-header" onclick="toggleGroup('shortcutGroup', this)">보관함 <span>▼</span></div>
    <div id="shortcutGroup" class="folder-container">
        <div class="sidebar-item active" id="allSBtn" onclick="changeView('shortcut', 'all')">📱 모든 단축어</div>
        <div id="shortcutFolderList"></div>
    </div>

    <div class="group-header" onclick="toggleGroup('linkGroup', this)" style="margin-top:15px;">링크 저장 <span>▼</span></div>
    <div id="linkGroup" class="folder-container">
        <div class="sidebar-item" id="allLBtn" onclick="changeView('link', 'all')">🔗 모든 링크</div>
        <div id="linkFolderList"></div>
    </div>

    <div style="flex: 1;"></div>
    <button onclick="toggleTheme()" style="padding: 12px; border-radius: 12px; border: none; background: var(--apple-blue); color: white; font-weight: bold; margin-bottom: 25px;">🌓 테마 전환</button>
</div>

<div class="main-content">
    <div class="header">
        <div class="header-top">
            <h1 id="viewTitle" style="margin:0; font-size: 1.6rem;">로딩 중...</h1>
            <div style="display: flex; gap: 15px; align-items: center;">
                <button id="editBtn" onclick="toggleEditMode()" style="color:var(--apple-blue); background:none; border:none; font-weight:bold; cursor:pointer;">편집</button>
                <button onclick="openModal()" style="background:none; border:none; font-size:28px; color:var(--apple-blue); cursor:pointer;">＋</button>
            </div>
        </div>
        <div class="search-bar-container">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-bar" id="searchInput" placeholder="검색" oninput="render()">
        </div>
    </div>
    <div id="mainDisplay" class="grid-container"></div>
</div>

<div id="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 id="modalTitle" style="margin:0">정보 편집</h2>
        <input type="text" id="in-title" placeholder="이름 (제목)">
        <input type="text" id="in-icon" placeholder="아이콘 (이모지 추천)">
        <input type="text" id="in-url" placeholder="URL 주소 (iCloud 또는 웹 주소)">
        <input type="text" id="in-desc" placeholder="짧은 설명 (부제목)">
        <input type="text" id="in-folder" placeholder="폴더명">
        <textarea id="in-memo" placeholder="상세 사용법 또는 메모" style="height:80px;"></textarea>
        <div id="palette" style="display:flex; gap:8px; flex-wrap:wrap; margin-top:5px;"></div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button onclick="closeModal()" style="flex:1; padding:15px; border-radius:15px; border:none; cursor:pointer;">취소</button>
            <button onclick="saveEntry()" style="flex:1; padding:15px; border-radius:15px; border:none; background:var(--apple-blue); color:white; font-weight:bold; cursor:pointer;">저장</button>
        </div>
    </div>
</div>

<script>
    // 제공해주신 정보 적용
    const BIN_ID = '69ce0ae7aaba882197b8e875'; 
    const API_KEY = '$2a$10$/FXh/Agpz01vjrcmEic7wugXaICmT9cXP68MXB3uwRu.asgw6h4NS'; 

    let db = { shortcuts: [], links: [] };
    let currentMode = 'shortcut'; 
    let currentFolder = 'all';
    let editId = null;
    let isEditMode = false;
    let selectedColor = '#007aff';
    const presets = ['#5856D6', '#34C75 green', '#007AFF', '#FF9500', '#FF3B30', '#E27373', '#8E8E93', '#2C2C2E', '#A2845E'];

    async function loadData() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { 'X-Master-Key': API_KEY }});
            const data = await res.json();
            db = data.record.shortcuts ? data.record : { shortcuts: [], links: [] };
            document.getElementById('viewTitle').innerText = '모든 단축어';
            render();
        } catch (e) {
            db = JSON.parse(localStorage.getItem('shortcut_link_db')) || { shortcuts: [], links: [] };
            render();
        }
    }

    async function saveData() {
        localStorage.setItem('shortcut_link_db', JSON.stringify(db));
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify(db)
            });
        } catch (e) { console.error("Cloud Save Error"); }
    }

    function toggleGroup(id, el) {
        const container = document.getElementById(id);
        const arrow = el.querySelector('span');
        container.classList.toggle('collapsed');
        arrow.innerText = container.classList.contains('collapsed') ? '▶' : '▼';
    }

    function changeView(mode, folder) {
        currentMode = mode; currentFolder = folder;
        document.getElementById('viewTitle').innerText = (mode==='shortcut'?'단축어: ':'링크: ') + (folder==='all'?'전체':folder);
        document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
        event.currentTarget.classList.add('active');
        render();
    }

    function openModal(id = null) {
        if(isEditMode) return;
        document.getElementById('modal').style.display = 'flex';
        const p = document.getElementById('palette');
        p.innerHTML = presets.map(c => `<div onclick="selectedColor='${c}'; openModal(${id})" style="width:28px; height:28px; border-radius:50%; background:${c}; cursor:pointer; border:2px solid ${selectedColor===c?'#000':'transparent'}"></div>`).join('');
        
        if(id) {
            const item = (currentMode === 'shortcut' ? db.shortcuts : db.links).find(x => x.id === id);
            editId = id;
            document.getElementById('in-title').value = item.title;
            document.getElementById('in-icon').value = item.icon || '';
            document.getElementById('in-url').value = item.url;
            document.getElementById('in-desc').value = item.desc || '';
            document.getElementById('in-folder').value = item.folder || '기본';
            document.getElementById('in-memo').value = item.memo || '';
            selectedColor = item.color;
        } else {
            editId = null;
            document.querySelectorAll('#modal input, #modal textarea').forEach(i => i.value = '');
            selectedColor = presets[2];
        }
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function saveEntry() {
        const entry = {
            id: editId || Date.now(),
            title: document.getElementById('in-title').value || '제목 없음',
            icon: document.getElementById('in-icon').value,
            url: document.getElementById('in-url').value,
            desc: document.getElementById('in-desc').value,
            folder: document.getElementById('in-folder').value || '기본',
            memo: document.getElementById('in-memo').value,
            color: selectedColor
        };
        const target = currentMode === 'shortcut' ? db.shortcuts : db.links;
        if(editId) { const idx = target.findIndex(x => x.id === editId); target[idx] = entry; }
        else { target.push(entry); }
        saveData(); render(); closeModal();
    }

    function deleteItem(id, e) {
        e.stopPropagation();
        if(!confirm('정말 삭제할까요?')) return;
        if(currentMode === 'shortcut') db.shortcuts = db.shortcuts.filter(x => x.id !== id);
        else db.links = db.links.filter(x => x.id !== id);
        saveData(); render();
    }

    function toggleEditMode() {
        isEditMode = !isEditMode;
        document.body.classList.toggle('edit-mode', isEditMode);
        document.getElementById('editBtn').innerText = isEditMode ? "완료" : "편집";
        render();
    }

    function render() {
        const display = document.getElementById('mainDisplay');
        const term = document.getElementById('searchInput').value.toLowerCase();
        
        if (currentMode === 'shortcut') {
            display.className = 'grid-container';
            let list = currentFolder === 'all' ? db.shortcuts : db.shortcuts.filter(x => x.folder === currentFolder);
            if(term) list = list.filter(x => x.title.toLowerCase().includes(term));
            display.innerHTML = list.map(s => `
                <div class="shortcut-card" style="background:${s.color}" onclick="openModal(${s.id})">
                    <div class="del-badge" onclick="deleteItem(${s.id}, event)">✕</div>
                    <div class="card-top"><div style="font-size:1.8rem">${s.icon||'📱'}</div><div class="more-dots">...</div></div>
                    <div><div style="font-weight:bold; font-size:1.1rem">${s.title}</div><div style="font-size:0.8rem; opacity:0.9">${s.desc||''}</div></div>
                </div>
            `).join('');
        } else {
            display.className = 'link-list-container';
            let list = currentFolder === 'all' ? db.links : db.links.filter(x => x.folder === currentFolder);
            if(term) list = list.filter(x => x.title.toLowerCase().includes(term));
            display.innerHTML = list.map(l => `
                <div class="link-card" style="background:${l.color}" onclick="openModal(${l.id})">
                    <div class="del-badge" onclick="deleteItem(${l.id}, event)">✕</div>
                    <div class="link-info">
                        <div class="link-title" onclick="window.open('${l.url}', '_blank'); event.stopPropagation();">${l.icon||'🔗'} ${l.title}</div>
                        <div class="link-url-text">${l.desc || l.url}</div>
                    </div>
                    <div class="more-dots">...</div>
                </div>
            `).join('');
        }

        document.getElementById('shortcutFolderList').innerHTML = [...new Set(db.shortcuts.map(x=>x.folder||'기본'))].map(f => `
            <div class="sidebar-item ${currentMode==='shortcut'&&currentFolder===f?'active':''}" onclick="changeView('shortcut', '${f}')">📂 ${f}</div>
        `).join('');
        document.getElementById('linkFolderList').innerHTML = [...new Set(db.links.map(x=>x.folder||'기본'))].map(f => `
            <div class="sidebar-item ${currentMode==='link'&&currentFolder===f?'active':''}" onclick="changeView('link', '${f}')">📁 ${f}</div>
        `).join('');
    }

    function toggleTheme() {
        const b = document.body;
        b.setAttribute('data-theme', b.getAttribute('data-theme')==='light'?'dark':'light');
    }

    loadData();
</script>
</body>
</html>
