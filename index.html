<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Shortcut Pro - JSONbin Edition</title>
    <style>
        :root {
            --bg-color: #f2f2f7; --sidebar-bg: #e5e5ea; --text-main: #1c1c1e;
            --apple-blue: #007aff; --modal-bg: #ffffff; --card-shadow: rgba(0,0,0,0.1);
        }
        [data-theme='dark'] {
            --bg-color: #1c1c1e; --sidebar-bg: #2c2c2e; --text-main: #ffffff;
            --modal-bg: #3a3a3c; --card-shadow: rgba(0,0,0,0.3);
        }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; transition: 0.3s; }

        /* 사이드바 및 하단 버튼 위치 최적화 */
        .sidebar { 
            width: 240px; background: var(--sidebar-bg); padding: 20px 10px 40px 10px; 
            display: flex; flex-direction: column; gap: 8px; border-right: 1px solid rgba(0,0,0,0.1); 
            z-index: 100; transition: transform 0.3s ease; box-sizing: border-box;
        }
        .sidebar-item { padding: 12px 15px; border-radius: 12px; cursor: pointer; font-size: 0.95rem; display: flex; align-items: center; gap: 10px; }
        .sidebar-item.active { background: rgba(0,0,0,0.1); font-weight: bold; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .header { padding: 20px 25px; display: flex; flex-direction: column; gap: 12px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .search-bar-container { position: relative; width: 100%; }
        .search-bar { width: 100%; padding: 10px 15px 10px 35px; border-radius: 12px; border: none; background: rgba(0,0,0,0.06); color: var(--text-main); font-size: 1rem; box-sizing: border-box; }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.5; }

        .grid-container { flex: 1; overflow-y: auto; padding: 0 25px 30px 25px; display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 18px; align-content: start; }

        /* 카드 및 드래그 애니메이션 */
        .shortcut-card { position: relative; aspect-ratio: 1 / 1; border-radius: 35px; padding: 22px; color: white; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 8px 16px var(--card-shadow); cursor: pointer; transition: 0.2s; touch-action: none; }
        .shortcut-card.dragging { opacity: 0.4; transform: scale(0.95); }
        .edit-mode .shortcut-card { animation: shake 0.3s infinite; }
        @keyframes shake { 0% {transform: rotate(-0.5deg);} 50% {transform: rotate(0.5deg);} 100% {transform: rotate(-0.5deg);} }

        .card-top { display: flex; justify-content: space-between; align-items: center; }
        .card-icon { font-size: 2rem; }
        .more-dots { width: 32px; height: 32px; background: rgba(255,255,255,0.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .del-badge { position: absolute; top: 15px; right: 15px; width: 34px; height: 34px; background: #ff3b30; color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 10; border: 2px solid white; }
        .edit-mode .del-badge { display: flex; }
        .edit-mode .more-dots { display: none; }
        .card-title { font-size: 1.2rem; font-weight: bold; }
        .card-desc { font-size: 0.85rem; opacity: 0.9; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* 모달 & 컬러피커 */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 200; padding: 20px; }
        .modal-content { background: var(--modal-bg); border-radius: 30px; width: 100%; max-width: 380px; padding: 28px; display: flex; flex-direction: column; gap: 10px; }
        input, textarea { background: rgba(0,0,0,0.05); border: none; padding: 12px; border-radius: 12px; color: var(--text-main); width: 100%; box-sizing: border-box; }
        .palette-container { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-dot.selected { border-color: var(--text-main); transform: scale(1.1); }
        .custom-color-btn { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; background-image: conic-gradient(red, yellow, lime, aqua, blue, magenta, red); display: flex; align-items: center; justify-content: center; }
        .custom-color-input { opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        /* 모바일 대응 */
        .menu-toggle { display: none; background: none; border: none; font-size: 26px; color: var(--apple-blue); cursor: pointer; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 90; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; height: 100%; transform: translateX(-100%); padding-bottom: 90px; }
            .sidebar.open { transform: translateX(0); }
            .menu-toggle { display: block; }
            .overlay.active { display: block; }
        }
    </style>
</head>
<body data-theme="light">

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
    <h2 style="margin: 10px 15px 15px 15px;">보관함</h2>
    <div class="sidebar-item active" id="allFolderBtn" onclick="filterFolder('all')">📱 모든 단축어</div>
    <div id="folderList"></div>
    <div style="flex: 1;"></div>
    <div style="padding: 10px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 25px;">
        <button onclick="toggleTheme()" style="padding: 12px; border-radius: 12px; border: none; cursor: pointer; background: var(--apple-blue); color: white; font-weight: bold;">🌓 테마 전환</button>
        <div style="display: flex; gap: 5px;">
            <button onclick="exportData()" style="flex:1; padding: 8px; font-size: 11px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1); background: var(--modal-bg); color: var(--text-main);">내보내기</button>
            <button onclick="document.getElementById('importFile').click()" style="flex:1; padding: 8px; font-size: 11px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1); background: var(--modal-bg); color: var(--text-main);">불러오기</button>
        </div>
    </div>
</div>

<div class="main-content">
    <div class="header">
        <div class="header-top">
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                <h1 id="viewTitle" style="margin:0; font-size: 1.7rem;">로딩 중...</h1>
            </div>
            <div style="display: flex; gap: 15px; align-items: center;">
                <button id="editBtn" onclick="toggleEditMode()" style="color:var(--apple-blue); background:none; border:none; font-weight:bold; cursor:pointer;">편집</button>
                <button onclick="openModal()" style="background:none; border:none; font-size:28px; cursor:pointer; color:var(--apple-blue);">＋</button>
            </div>
        </div>
        <div class="search-bar-container">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-bar" id="searchInput" placeholder="검색" oninput="searchShortcuts()">
        </div>
    </div>
    <div class="grid-container" id="shortcutGrid"></div>
</div>

<div id="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
            <h2 id="modalTitle" style="margin:0">단축어 편집</h2>
            <a href="#" id="externalLink" style="color:var(--apple-blue); text-decoration:none; font-weight:bold;" target="_blank">열기</a>
        </div>
        <input type="text" id="in-title" placeholder="이름">
        <input type="text" id="in-icon" placeholder="아이콘">
        <input type="text" id="in-url" placeholder="iCloud 링크">
        <input type="text" id="in-desc" placeholder="짧은 설명">
        <input type="text" id="in-folder" placeholder="폴더명">
        <textarea id="in-usage" placeholder="상세 설명"></textarea>
        <div class="palette-container">
            <div id="palette" style="display:flex; gap:8px;"></div>
            <div class="custom-color-btn" id="customColorBtn">
                <input type="color" id="customColorPicker" class="custom-color-input" oninput="setCustomColor(this.value)">
            </div>
        </div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button onclick="closeModal()" style="flex:1; padding:15px; border-radius:15px; border:none;">취소</button>
            <button onclick="saveShortcut()" style="flex:1; padding:15px; border-radius:15px; border:none; background:var(--apple-blue); color:white; font-weight:bold;">저장</button>
        </div>
    </div>
</div>

<input type="file" id="importFile" style="display:none" onchange="importData(event)">

<script>
    // --- [사용자 설정: 여기에 본인 정보 입력] ---
    const BIN_ID = '69ce0ae7aaba882197b8e875'; 
    const API_KEY = '$2a$10$/FXh/Agpz01vjrcmEic7wugXaICmT9cXP68MXB3uwRu.asgw6h4NS'; 
    // ----------------------------------------

    let shortcuts = [];
    let currentFolder = 'all';
    let editId = null;
    let isEditMode = false;
    let selectedColor = '#007aff';
    const presets = ['#5856D6', '#34C759', '#007AFF', '#FF9500', '#FF3B30', '#E27373', '#8E8E93', '#2C2C2E'];

    // JSONbin 데이터 불러오기
    async function loadData() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { 'X-Master-Key': API_KEY }
            });
            const data = await res.json();
            shortcuts = data.record || [];
            document.getElementById('viewTitle').innerText = '모든 단축어';
            render();
        } catch (err) {
            console.error("로딩 실패", err);
            shortcuts = JSON.parse(localStorage.getItem('shortcuts_v3')) || [];
            document.getElementById('viewTitle').innerText = '모든 단축어(로컬)';
            render();
        }
    }

    // JSONbin 데이터 저장
    async function saveData() {
        localStorage.setItem('shortcuts_v3', JSON.stringify(shortcuts));
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify(shortcuts)
            });
        } catch (err) { console.error("저장 실패", err); }
    }

    function toggleTheme() {
        const next = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.body.setAttribute('data-theme', next);
    }
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }
    function toggleEditMode() {
        isEditMode = !isEditMode;
        document.body.classList.toggle('edit-mode', isEditMode);
        document.getElementById('editBtn').innerText = isEditMode ? "완료" : "편집";
        render();
    }

    function selectColor(c) {
        selectedColor = c;
        const btn = document.getElementById('customColorBtn');
        btn.style.backgroundImage = 'none'; btn.style.backgroundColor = c;
        document.querySelectorAll('.color-dot').forEach(d => {
            d.classList.toggle('selected', rgbToHex(d.style.backgroundColor) === c.toLowerCase());
        });
    }
    function setCustomColor(val) { selectColor(val); }
    function rgbToHex(rgb) {
        const res = rgb.match(/\d+/g);
        return res ? "#" + res.map(x => parseInt(x).toString(16).padStart(2, '0')).join('') : rgb;
    }

    // 드래그 앤 드롭
    let dragSrcEl = null;
    function handleDragStart(e) { 
        if(!isEditMode) return;
        dragSrcEl = this; 
        this.classList.add('dragging'); 
        e.dataTransfer.effectAllowed = 'move';
    }
    function handleDragOver(e) { if (e.preventDefault) e.preventDefault(); return false; }
    function handleDrop(e) {
        if (e.stopPropagation) e.stopPropagation();
        if (dragSrcEl !== this) {
            const fromIdx = shortcuts.findIndex(s => s.id == dragSrcEl.dataset.id);
            const toIdx = shortcuts.findIndex(s => s.id == this.dataset.id);
            const movedItem = shortcuts.splice(fromIdx, 1)[0];
            shortcuts.splice(toIdx, 0, movedItem);
            render(); saveData();
        }
        return false;
    }
    function handleDragEnd() { this.classList.remove('dragging'); }

    function openModal(id = null) {
        if(isEditMode) return;
        document.getElementById('modal').style.display = 'flex';
        const p = document.getElementById('palette');
        p.innerHTML = presets.map(c => `<div class="color-dot" style="background-color:${c}" onclick="selectColor('${c}')"></div>`).join('');
        if(id) {
            const s = shortcuts.find(item => item.id === id);
            editId = id;
            document.getElementById('in-title').value = s.title;
            document.getElementById('in-icon').value = s.icon;
            document.getElementById('in-url').value = s.url || '';
            document.getElementById('in-desc').value = s.desc || '';
            document.getElementById('in-folder').value = s.folder || '';
            document.getElementById('in-usage').value = s.usage || '';
            document.getElementById('externalLink').href = s.url || '#';
            document.getElementById('externalLink').style.display = s.url ? 'block' : 'none';
            selectColor(s.color);
        } else {
            editId = null;
            document.querySelectorAll('#modal input, #modal textarea').forEach(i => i.value = '');
            selectColor(presets[2]);
        }
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function saveShortcut() {
        const data = {
            id: editId || Date.now(),
            title: document.getElementById('in-title').value || '제목 없음',
            icon: document.getElementById('in-icon').value || '🔗',
            url: document.getElementById('in-url').value,
            desc: document.getElementById('in-desc').value,
            folder: document.getElementById('in-folder').value || '기본',
            usage: document.getElementById('in-usage').value,
            color: selectedColor
        };
        if(editId) shortcuts = shortcuts.map(s => s.id === editId ? data : s);
        else shortcuts.push(data);
        render(); closeModal(); saveData();
    }

    function deleteShortcut(id, e) {
        e.stopPropagation();
        if(confirm('삭제할까요?')) {
            shortcuts = shortcuts.filter(s => s.id !== id);
            render(); saveData();
        }
    }

    function searchShortcuts() { render(document.getElementById('searchInput').value.toLowerCase()); }
    function filterFolder(f) {
        currentFolder = f;
        document.getElementById('viewTitle').innerText = f === 'all' ? '모든 단축어' : f;
        if(window.innerWidth <= 768) toggleSidebar();
        render();
    }

    function render(term = "") {
        const grid = document.getElementById('shortcutGrid');
        let filtered = currentFolder === 'all' ? shortcuts : shortcuts.filter(s => s.folder === currentFolder);
        if(term) filtered = filtered.filter(s => s.title.toLowerCase().includes(term) || (s.desc && s.desc.toLowerCase().includes(term)));

        grid.innerHTML = filtered.map(s => `
            <div class="shortcut-card" style="background-color:${s.color}" data-id="${s.id}"
                 draggable="${isEditMode}" 
                 ondragstart="handleDragStart.call(this, event)" 
                 ondragover="handleDragOver.call(this, event)" 
                 ondrop="handleDrop.call(this, event)"
                 ondragend="handleDragEnd.call(this, event)"
                 onclick="openModal(${s.id})">
                <div class="del-badge" onclick="deleteShortcut(${s.id}, event)">✕</div>
                <div class="card-top">
                    <div class="card-icon">${s.icon}</div>
                    <div class="more-dots">...</div>
                </div>
                <div class="card-content">
                    <div class="card-title">${s.title}</div>
                    <div class="card-desc">${s.desc || ''}</div>
                </div>
            </div>
        `).join('');

        const folders = [...new Set(shortcuts.map(s => s.folder || '기본'))];
        document.getElementById('folderList').innerHTML = folders.map(f => `
            <div class="sidebar-item ${currentFolder === f ? 'active' : ''}" onclick="filterFolder('${f}')">📂 ${f}</div>
        `).join('');
        document.getElementById('allFolderBtn').classList.toggle('active', currentFolder === 'all');
    }

    function exportData() {
        const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(JSON.stringify(shortcuts));
        const link = document.createElement('a'); link.href = dataUri; link.download = 'shortcuts.json'; link.click();
    }
    function importData(e) {
        const reader = new FileReader();
        reader.onload = (ev) => { shortcuts = JSON.parse(ev.target.result); render(); saveData(); };
        reader.readAsText(e.target.files[0]);
    }

    loadData(); // 시작 시 JSONbin에서 불러오기
</script>
</body>
</html>
